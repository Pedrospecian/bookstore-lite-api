spring:
  application:
    name: bookstore-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5435/bookstore}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate # o schema é criado pelas migrations do Flyway, não pelo Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-32-chars}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}   # 15 min
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 dias
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /docs